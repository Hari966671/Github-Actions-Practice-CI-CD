name: upload_download_artifactory
on:
  push:
    branches: [main]
env:
  name: "Hari"
  city: "Kuppam"
jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: creating the file
        run: |
          echo "reading the variable" 
          echo "my name is $name"
          echo "this is githubaction course syllabus" > syllabus.txt
        
      - name: Upload file
        uses: actions/upload-artifact@v4
        with:
          name: my-course
          path: course/syllabus.txt
  download:
    runs-on: ubuntu-latest
    needs: upload
    steps:
      - name: "download the file"
        uses: actions/download-artifact@v4
        with:
          name: my_course

      - name: verifying the file
        run: cat my_course
  
  
            
            
